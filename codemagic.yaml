workflows:
  mapbox-navigation-example:
    name: Mapbox Navigation Example Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.22.3
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'master'
          include: true
    scripts:
      - name: Set up local.properties
        script: |
          # We need to set this in the example's android folder
          echo "flutter.sdk=$FLUTTER_ROOT" > example/android/local.properties

      - name: Generate Firebase Options
        script: |
          # This prevents the kernel_snapshot failure by creating the missing file
          cat <<EOF > example/lib/firebase_options.dart
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart' show defaultTargetPlatform, kIsWeb, TargetPlatform;
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              switch (defaultTargetPlatform) {
                case TargetPlatform.android: return android;
                default: throw UnsupportedError('DefaultFirebaseOptions are not supported for this platform.');
              }
            }
            static const FirebaseOptions android = FirebaseOptions(
                apiKey: "AIzaSyAk9DOEc_hmyeAJEob8QBAyQkiZCp_CPuI",
                authDomain: "uberzo.firebaseapp.com",
                databaseURL: "https://uberzo-default-rtdb.firebaseio.com",
                projectId: "uberzo",
                storageBucket: "uberzo.firebasestorage.app",
                messagingSenderId: "805708188196",
                appId: "1:805708188196:web:4bbfbf0b2833ade319a6b1",
                measurementId: "G-9F656XRL64"
            );
          }
          EOF

      - name: Get dependencies for Root and Example
        script: |
          # First, get dependencies for the plugin itself
          flutter pub get
          
          # Then, go into the example folder and get dependencies there
          cd example
          flutter pub get

      - name: Build Android APK
        script: |
          cd example
          # Building the APK
          # Adding --no-tree-shake-icons as old Mapbox versions often have icon font issues
          flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation

    artifacts:
      - example/build/app/outputs/flutter-apk/*.apk
